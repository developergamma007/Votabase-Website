# Serve Digital Asset Links at domain root (required for Play Store TWA).
# Next.js basePath (/ui) cannot serve /.well-known at the root by itself.
#
# Add inside your nginx server block for votabase.iswot.in:

location = /.well-known/assetlinks.json {
    alias /home/ubuntu/Votabase-Website/deploy/assetlinks.json;
    default_type application/json;
    add_header Access-Control-Allow-Origin *;
}

# After editing:
#   sudo nginx -t && sudo systemctl reload nginx
#
# Verify:
#   curl https://votabase.iswot.in/.well-known/assetlinks.json
