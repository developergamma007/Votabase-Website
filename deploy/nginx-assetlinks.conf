# Digital Asset Links for Play Store TWA
#
# IMPORTANT: /.well-known/ is at the DOMAIN ROOT, not under /ui.
# Next.js (basePath /ui) cannot serve this path — nginx must handle it.
#
# Quick install on server:
#   cd ~/Votabase-Website && git pull
#   bash deploy/install-assetlinks.sh
#
# Manual nginx block (must be INSIDE server { } for votabase.iswot.in,
# BEFORE the catch-all "location / { proxy_pass ... }" block):

location = /.well-known/assetlinks.json {
    alias /var/www/votabase-well-known/.well-known/assetlinks.json;
    default_type application/json;
    add_header Access-Control-Allow-Origin *;
}

# Verify — must return JSON, NOT an HTML 404 page:
#   curl -s https://votabase.iswot.in/.well-known/assetlinks.json
